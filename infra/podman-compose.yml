# Podman compose file for local infrastructure dependencies (Postgres/Redis/Milvus/SearXNG).
# Target platform: Windows (development and deployment).
# Run with Podman Desktop on Windows (podman machine / WSL2 backend).
# Variables are loaded from the repo root `.env` by `infra/up.ps1` (PowerShell) or via your shell environment.
version: "3.9"

services:
  postgres:
    image: docker.io/postgres:18.1-alpine
    container_name: mkb_postgres
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"
      POSTGRES_USER: ${POSTGRES_USER:-mkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mkb}
      POSTGRES_DB: ${POSTGRES_DB:-mkb}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # 注意：PostgreSQL 在 Windows Podman 上无法使用本地目录挂载，使用命名卷
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: docker.io/redis:8.6.0-alpine
    container_name: mkb_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"

  etcd:
    image: quay.io/coreos/etcd:v3.6.7
    container_name: mkb_etcd
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      [
        "etcd",
        "-advertise-client-urls",
        "http://0.0.0.0:2379",
        "-listen-client-urls",
        "http://0.0.0.0:2379",
        "--data-dir",
        "/etcd",
      ]
    ports:
      - "${ETCD_PORT:-2379}:2379"
    volumes:
      - ./data/etcd:/etcd

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mkb_minio
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/minio_data", "--console-address", ":9001"]
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/minio_data

  milvus:
    image: docker.io/milvusdb/milvus:v2.6.11
    container_name: mkb_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HTTP_PORT:-9091}:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - ./data/milvus:/var/lib/milvus

  searxng_valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: mkb_searxng_valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ./data/searxng-valkey:/data
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,searxng,searxng_valkey,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*"

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: mkb_searxng
    restart: unless-stopped
    environment:
      # 代理统一在 /etc/searxng/settings.yml 的 outgoing.proxies 中管理；
      # 这里显式置空，避免容器级环境变量和 SearXNG 自身网络层相互干扰。
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY:-localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,searxng,searxng_valkey,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*}
      no_proxy: ${SEARXNG_NO_PROXY:-localhost,127.0.0.1,postgres,redis,minio,milvus,etcd,searxng,searxng_valkey,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.30.*,172.31.*,192.168.*}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:18080/}
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-searxng-secret}
      SEARXNG_LIMITER: ${SEARXNG_LIMITER:-false}
      SEARXNG_PUBLIC_INSTANCE: "false"
      SEARXNG_IMAGE_PROXY: ${SEARXNG_IMAGE_PROXY:-false}
      SEARXNG_VALKEY_URL: ${SEARXNG_VALKEY_URL:-valkey://searxng_valkey:6379/0}
      FORCE_OWNERSHIP: "true"
    ports:
      - "${SEARXNG_PORT:-18080}:8080"
    depends_on:
      - searxng_valkey
    volumes:
      - ./searxng/config:/etc/searxng
      - ./data/searxng:/var/cache/searxng

volumes:
  postgres_data:
