# Local development compose profile.
# Canonical layering uses:
#   podman-compose.base.yml + podman-compose.dev.yml
# This flattened file is kept as a dev-only convenience entrypoint.
version: "3.9"

services:
  postgres:
    image: docker.io/postgres:18.1-alpine
    container_name: mkb_postgres
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: docker.io/redis:8.6.0-alpine
    container_name: mkb_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data

  etcd:
    image: quay.io/coreos/etcd:v3.6.7
    container_name: mkb_etcd
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      [
        "etcd",
        "-advertise-client-urls",
        "http://0.0.0.0:2379",
        "-listen-client-urls",
        "http://0.0.0.0:2379",
        "--data-dir",
        "/etcd",
      ]
    ports:
      - "${ETCD_PORT}:2379"
    volumes:
      - ./data/etcd:/etcd

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mkb_minio
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/minio_data", "--console-address", ":9001"]
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ./data/minio:/minio_data

  milvus:
    image: docker.io/milvusdb/milvus:v2.6.11
    container_name: mkb_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_HTTP_PORT}:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - ./data/milvus:/var/lib/milvus

  searxng_valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: mkb_searxng_valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}
    volumes:
      - ./data/searxng-valkey:/data

  searxng:
    image: docker.io/searxng/searxng:2026.4.7-08ef7a63d
    container_name: mkb_searxng
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}
      no_proxy: ${SEARXNG_NO_PROXY}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LIMITER: ${SEARXNG_LIMITER}
      SEARXNG_PUBLIC_INSTANCE: ${SEARXNG_PUBLIC_INSTANCE}
      SEARXNG_IMAGE_PROXY: ${SEARXNG_IMAGE_PROXY}
      SEARXNG_VALKEY_URL: ${SEARXNG_VALKEY_URL}
      FORCE_OWNERSHIP: "true"
    depends_on:
      - searxng_valkey
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - ./searxng/config:/etc/searxng
      - ./data/searxng:/var/cache/searxng

volumes:
  postgres_data:
