# Single source of truth for infra services across local development
# and single-node production deployments.
# Supply concrete values from infra/env/dev.env or infra/env/prod.env at deploy time.
version: "3.9"

services:
  postgres:
    image: docker.io/postgres:18.3-alpine
    container_name: mkb_postgres
    restart: always
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: docker.io/redis:8.6.2-alpine
    container_name: mkb_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  etcd:
    image: quay.io/coreos/etcd:v3.6.10
    container_name: mkb_etcd
    restart: always
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      [
        "etcd",
        "-advertise-client-urls",
        "http://0.0.0.0:2379",
        "-listen-client-urls",
        "http://0.0.0.0:2379",
        "--data-dir",
        "/etcd",
      ]
    ports:
      - "${ETCD_PORT}:2379"
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://127.0.0.1:2379"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mkb_minio
    restart: always
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/minio_data", "--console-address", ":9001"]
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: docker.io/milvusdb/milvus:v2.6.14
    container_name: mkb_milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_HTTP_PORT}:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  searxng_valkey:
    image: docker.io/valkey/valkey:9.0.3-alpine
    container_name: mkb_searxng_valkey
    restart: always
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}
    volumes:
      - searxng_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  searxng:
    image: docker.io/searxng/searxng:2026.4.17-e8299a4c3
    container_name: mkb_searxng
    restart: always
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}
      no_proxy: ${SEARXNG_NO_PROXY}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LIMITER: ${SEARXNG_LIMITER}
      SEARXNG_PUBLIC_INSTANCE: ${SEARXNG_PUBLIC_INSTANCE}
      SEARXNG_IMAGE_PROXY: ${SEARXNG_IMAGE_PROXY}
      SEARXNG_VALKEY_URL: ${SEARXNG_VALKEY_URL}
      FORCE_OWNERSHIP: "true"
    depends_on:
      - searxng_valkey
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - ./searxng/config:/etc/searxng:ro
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/config', timeout=5)",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  searxng_valkey_data:
  searxng_cache:
