# Production overlay example. Use with podman-compose.base.yml.
# Inject concrete values from infra/env/prod.env on your platform. Do not commit prod.env.
version: "3.9"

services:
  postgres:
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  etcd:
    restart: always
    ports:
      - "${ETCD_PORT}:2379"
    volumes:
      - etcd_data:/etcd

  minio:
    restart: always
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    restart: always
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_HTTP_PORT}:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  searxng_valkey:
    restart: always
    volumes:
      - searxng_valkey_data:/data

  searxng:
    restart: always
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - ./searxng/config:/etc/searxng:ro
      - searxng_cache:/var/cache/searxng

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  searxng_valkey_data:
  searxng_cache:
