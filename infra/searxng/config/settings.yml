# SearXNG shared settings.
# Environment-specific public URL, secret, limiter and proxy routing must be injected
# outside this file. Do not commit host-specific egress proxies here.

use_default_settings: true

general:
  debug: false
  instance_name: "MKB SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  favicon_resolver: ""
  default_lang: "auto"
  # 启用镜像默认引擎全集后，不再靠 keep_only 白名单收敛；
  # 由短暂停用窗口把 403 / 429 / CAPTCHA 引擎临时摘出，让其余引擎继续返回结果。
  suspended_times:
    SearxEngineAccessDenied: 120
    SearxEngineTooManyRequests: 120
    SearxEngineCaptcha: 1800
  formats:
    - html
    - json

server:
  # Overwritten by container env: SEARXNG_SECRET / SEARXNG_BASE_URL / SEARXNG_LIMITER
  secret_key: "set-via-env-or-secret-file"
  base_url: "https://searxng.example.invalid/"
  bind_address: "0.0.0.0"
  port: 8080
  # 是否启用 limiter 由部署环境决定：
  # 本地开发可关闭，接入反向代理或公网暴露时应开启，并保留 Valkey + limiter.toml 配套能力。
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

valkey:
  # Overwritten by container env: SEARXNG_VALKEY_URL
  url: valkey://searxng_valkey:6379/0

outgoing:
  # 若需要环境级代理池，请在未提交的本地覆盖文件或部署平台模板中注入，
  # 不要把宿主机 IP 或办公网络代理直接写进仓库。
  request_timeout: 12.0
  max_request_timeout: 20.0
  extra_proxy_timeout: 10
  pool_connections: 20
  pool_maxsize: 10
  retries: 2
  proxies: {}
  # 若当前出口链路不稳定，可在环境覆盖模板中关闭 HTTP/2 并调低并发。
  enable_http2: false
