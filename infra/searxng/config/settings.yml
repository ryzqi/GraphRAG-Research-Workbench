# SearXNG settings for local project integration.
# Optimized for local development / integration:
# - mounted into /etc/searxng
# - keep default settings, override only project-specific parts
# - enable JSON search API for programmatic usage

use_default_settings:
  engines:
    # 方案A：维持“多引擎白名单”单一路径，按项目当前确认口径启用：
    # - 全部 general / news / it / software wikis / q&a / science / wikimedia / web
    # - uncategorized 中仅保守开启常见通用搜索 / 内容源
    keep_only:
      - anaconda
      - aol
      - nixos wiki
      - baidu
      - baidu kaifa
      - wikipedia
      - bitbucket
      - crowdview
      - yep
      - yep news
      - docker hub
      - encyclosearch
      - wikidata
      - duckduckgo news
      - free software directory
      - fynd
      - gentoo
      - habrahabr
      - hoogle
      - karmasearch
      - karmasearch images
      - karmasearch videos
      - karmasearch news
      - lobste.rs
      - mdn
      - mankier
      - openairedatasets
      - openairepublications
      - packagist
      - presearch
      - presearch images
      - presearch videos
      - presearch news
      - pub.dev
      - quark
      - qwant
      - qwant news
      - qwant images
      - qwant videos
      - searchmysite
      - stackoverflow
      - askubuntu
      - superuser
      - discuss.python
      - caddy.community
      - pi-hole.community
      - startpage
      - startpage news
      - startpage images
      - yandex
      - brave
      - brave.images
      - brave.videos
      - brave.news
      - mojeek
      - mojeek images
      - mojeek news
      - naver
      - naver news
      - rubygems
      - wiby
      - wikibooks
      - wikinews
      - wikiquote
      - wikisource
      - wikispecies
      - wiktionary
      - wikiversity
      - wikivoyage
      - wolframalpha
      - yacy
      - wikimini
      - minecraft wiki
      - google
      - google images
      - google news
      - google videos
      - bing
      - bing images
      - bing news
      - bing videos
      - duckduckgo
      - github
      - reddit
      - youtube
      - arxiv
      - pubmed
      - openstreetmap

engines:
  - name: aol
    disabled: false
  - name: brave
    disabled: false
    retry_on_http_error: 403
  - name: mojeek
    disabled: false
    retry_on_http_error: 403
  - name: wiby
    disabled: false

general:
  debug: false
  instance_name: "MKB Local SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  favicon_resolver: ""
  default_lang: "auto"
  # 403 / 429 后不要长时间挂死整台实例；先缩短恢复窗口，再靠多引擎兜底。
  suspended_times:
    SearxEngineAccessDenied: 120
    SearxEngineTooManyRequests: 120
    SearxEngineCaptcha: 1800
  formats:
    - html
    - json

server:
  # Overwritten by container env: SEARXNG_SECRET / SEARXNG_BASE_URL / SEARXNG_LIMITER
  secret_key: "change-me-searxng-secret"
  base_url: "http://127.0.0.1:18080/"
  bind_address: "0.0.0.0"
  port: 8080
  # 本地直连 Podman 端口映射时默认关闭 limiter，避免没有反向代理转发
  # X-Forwarded-For / X-Real-IP 头时出现 429。若后续接入反向代理或公网暴露，
  # 可通过环境变量重新开启，并保留 Valkey + limiter.toml 配套能力。
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

valkey:
  # Overwritten by container env: SEARXNG_VALKEY_URL
  url: valkey://searxng_valkey:6379/0

outgoing:
  # 方案A：把出网代理迁移到 SearXNG 自己的 outgoing.proxies，
  # 不再依赖容器级 HTTP_PROXY/HTTPS_PROXY；这样后续才能扩成代理池 + 重试。
  # 当前只有 1 个代理出口，降低并发并略微提高超时，避免单代理被并发打爆后整批 0 结果。
  request_timeout: 12.0
  max_request_timeout: 20.0
  extra_proxy_timeout: 10
  pool_connections: 20
  pool_maxsize: 10
  retries: 1
  proxies:
    all://:
      # 当前先接入 1 个已知可访问的宿主机代理；后续若有更多出口，继续往列表里追加。
      - http://192.168.3.49:7890
  # 当前代理链路下多处 TLS/ConnectTimeout，先关闭 HTTP/2，优先稳定。
  enable_http2: false
