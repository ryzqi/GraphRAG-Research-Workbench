# SearXNG settings for local project integration.
# Optimized for local development / integration:
# - mounted into /etc/searxng
# - keep default settings, override only project-specific parts
# - enable JSON search API for programmatic usage
# - enable the full default engine catalog, then rely on suspension / retries for fallback

use_default_settings: true

general:
  debug: false
  instance_name: "MKB Local SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  favicon_resolver: ""
  default_lang: "auto"
  # 启用镜像默认引擎全集后，不再靠 keep_only 白名单收敛；
  # 由短暂停用窗口把 403 / 429 / CAPTCHA 引擎临时摘出，让其余引擎继续返回结果。
  suspended_times:
    SearxEngineAccessDenied: 120
    SearxEngineTooManyRequests: 120
    SearxEngineCaptcha: 1800
  formats:
    - html
    - json

server:
  # Overwritten by container env: SEARXNG_SECRET / SEARXNG_BASE_URL / SEARXNG_LIMITER
  secret_key: "change-me-searxng-secret"
  base_url: "http://127.0.0.1:18080/"
  bind_address: "0.0.0.0"
  port: 8080
  # 本地直连 Podman 端口映射时默认关闭 limiter，避免没有反向代理转发
  # X-Forwarded-For / X-Real-IP 头时出现 429。若后续接入反向代理或公网暴露，
  # 可通过环境变量重新开启，并保留 Valkey + limiter.toml 配套能力。
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

valkey:
  # Overwritten by container env: SEARXNG_VALKEY_URL
  url: valkey://searxng_valkey:6379/0

outgoing:
  # 方案A：把出网代理迁移到 SearXNG 自己的 outgoing.proxies，
  # 不再依赖容器级 HTTP_PROXY/HTTPS_PROXY；这样后续才能扩成代理池 + 重试。
  # 当前只有 1 个代理出口，因此先用较低并发 + 重试兜底，避免单次上游故障导致整批 0 结果。
  request_timeout: 12.0
  max_request_timeout: 20.0
  extra_proxy_timeout: 10
  pool_connections: 20
  pool_maxsize: 10
  retries: 2
  proxies:
    all://:
      # 当前先接入 1 个已知可访问的宿主机代理；后续若有更多出口，继续往列表里追加，
      # 这样多引擎 + 多代理才能同时具备更强的出口级冗余。
      - http://192.168.3.49:7890
  # 当前代理链路下多处 TLS/ConnectTimeout，先关闭 HTTP/2，优先稳定。
  enable_http2: false
