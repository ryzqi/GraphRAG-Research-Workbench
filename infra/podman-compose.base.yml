# Shared compose services for all profiles.
# Supply concrete values from env/dev.env or env/prod.env at deploy time.
version: "3.9"

services:
  postgres:
    image: docker.io/postgres:18.1-alpine
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}

  redis:
    image: docker.io/redis:8.6.0-alpine
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}

  etcd:
    image: quay.io/coreos/etcd:v3.6.7
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      [
        "etcd",
        "-advertise-client-urls",
        "http://0.0.0.0:2379",
        "-listen-client-urls",
        "http://0.0.0.0:2379",
        "--data-dir",
        "/etcd",
      ]

  minio:
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/minio_data", "--console-address", ":9001"]

  milvus:
    image: docker.io/milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${COMMON_NO_PROXY}
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    depends_on:
      - etcd
      - minio

  searxng_valkey:
    image: docker.io/valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}

  searxng:
    image: docker.io/searxng/searxng:2026.4.7-08ef7a63d
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ${SEARXNG_NO_PROXY}
      no_proxy: ${SEARXNG_NO_PROXY}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL}
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LIMITER: ${SEARXNG_LIMITER}
      SEARXNG_PUBLIC_INSTANCE: ${SEARXNG_PUBLIC_INSTANCE}
      SEARXNG_IMAGE_PROXY: ${SEARXNG_IMAGE_PROXY}
      SEARXNG_VALKEY_URL: ${SEARXNG_VALKEY_URL}
      FORCE_OWNERSHIP: "true"
    depends_on:
      - searxng_valkey
