version: "2026-04-13"
query_rewrite:
  freshness_keywords:
    - "最新"
    - "当前"
    - "最近"
    - "today"
    - "latest"
    - "current"
    - "news"
    - "release"
    - "changelog"
  auto_include_domains:
    langchain:
      - "docs.langchain.com"
  append_current_year_suffix: true
fusion:
  rrf_k: 60
  provider_weights:
    tavily: 1.0
    searxng: 0.85
rerank:
  high_authority_domain_suffixes:
    - "docs.langchain.com"
    - "openai.com"
    - "help.openai.com"
    - "docs.anthropic.com"
    - "ai.google.dev"
    - "learn.microsoft.com"
  low_quality_domain_suffixes:
    - "linkedin.com"
    - "x.com"
    - "twitter.com"
    - "medium.com"
  overlap_bonus_weight: 0.9
  lexical_bonus_per_term: 0.08
  authority_bonus: 0.45
  freshness_bonus: 0.12
  social_penalty: 0.35
  enriched_bonus: 0.15
enrichment:
  low_quality_domain_suffixes:
    - "linkedin.com"
    - "x.com"
    - "twitter.com"
    - "medium.com"
  snippet_min_length: 180
  top_k: 2
query_planning:
  default_clarification_question: "为了更准确地回答，请补充你指的是哪个对象、范围或时间？"
  default_ambiguity_true_reason: "问题缺少关键信息，需先澄清后再检索。"
  default_ambiguity_false_reason: "未命中需澄清信号，可直接继续检索。"
  ambiguity_reason_labels:
    missing_entity: "缺少具体对象"
    missing_scope: "缺少范围约束"
    missing_time: "缺少时间范围"
    missing_metric: "缺少指标口径"
    coref_uncertain: "指代对象不明确"
    mixed: "关键信息不完整"
  default_complexity_direct_reason: "未命中复杂问题信号，先按简单问题直接检索。"
  default_complexity_multi_query_reason: "目标单一但召回风险较高，按多路查询扩展检索。"
  default_complexity_decomposition_reason: "命中比较或多目标信号，按问题拆解处理。"
  guardrail_complexity_direct_reason: "命中稳定实体的清单型问题信号，应优先直接检索。"
  guardrail_complexity_decomposition_reason: "命中“分别/各自”等并列子问题信号，应拆分检索后再汇总。"
  multi_query_label_tokens:
    - "同义词"
    - "技术术语"
    - "表达"
    - "用户视角"
    - "实际问题"
    - "专家视角"
    - "专业术语"
    - "窄范围"
    - "具体条件"
    - "广范围"
    - "全局概览"
    - "术语化"
    - "术语化查询"
    - "用户表达"
    - "用户表达查询"
    - "范围扩展"
    - "范围扩展查询"
  troubleshoot_keywords:
    - "怎么"
    - "如何"
    - "解决"
    - "排查"
    - "报错"
    - "故障"
