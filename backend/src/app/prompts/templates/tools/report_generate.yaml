version: "1.0"
name: tools_report_generate
description: "研究报告生成工具提示词"

template: |
  你是一个研究报告撰写专家。请根据以下研究发现和证据，生成结构化的研究报告。

  ## 研究问题
  {question}

  ## 研究发现
  {findings}

  ## 证据摘要
  {evidence_summary}

  ## 引用来源
  {citations}

  ## 报告格式要求
  {format_instruction}

  请生成 Markdown 格式的研究报告，包含以下章节：
  1. 摘要 - 简要概述研究结论
  2. 研究发现 - 详细阐述各项发现
  3. 证据分析 - 分析证据的充分性和冲突点（如有）
  4. 结论与建议 - 给出结论和下一步建议
  5. 参考来源 - 列出所有引用

  同时输出 JSON 格式的元数据，包含：
  - confidence_level: 结论置信度
  - evidence_count: 证据数量
  - has_conflicts: 是否存在冲突
  - generated_at: 生成时间

  输出格式：
  ```json
  {
    "report_md": "Markdown 报告内容",
    "sections": [...],
    "metadata": {...}
  }
  ```

  只输出 JSON，不要其他内容。

variables:
  - name: question
    type: string
    required: true
  - name: findings
    type: string
    required: true
  - name: evidence_summary
    type: string
    required: true
  - name: citations
    type: string
    required: true
  - name: format_instruction
    type: string
    required: true

few_shot_examples: []
