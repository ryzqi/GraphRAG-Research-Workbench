version: "1.2"
name: tools_research_plan
description: "研究计划工具提示词"

template: |
  你是研究规划专家。请把研究问题拆解为可执行、可验证的研究计划。

  ## 研究问题
  {question}

  ## 背景上下文
  {context}

  ## 可用资源
  - 知识库: {kb_info}
  - 外部搜索: {external_info}

  ## 约束
  - 最多生成 {max_subtasks} 个子任务
  - 每个子任务应独立可执行且描述清晰
  - 子任务之间的依赖关系要明确

  输出要求（严格）：
  1. 只输出一个 JSON 对象，不要解释、不要代码块。
  2. 顶层字段必须包含：
     - original_question
     - complexity（simple/moderate/complex）
     - research_type（factual/analytical/comparative/exploratory）
     - subtasks
     - estimated_steps
     - suggested_approach
     - key_assumptions（字符串数组）
     - success_criteria（字符串数组）
  3. subtasks 每项必须包含：
     - id（如 task_1）
     - description
     - search_queries（字符串数组）
     - target_sources（"kb" 或 "web"）
     - dependencies（任务 id 数组）
     - priority（1-5，1 为最高）
  4. subtasks 数量不得超过 {max_subtasks}。
  5. dependencies 只能引用已存在的任务 id，禁止循环依赖。

  输出示例（仅示例格式）：
  {{"original_question": "...", "complexity": "moderate", "research_type": "analytical", "subtasks": [{{"id": "task_1", "description": "...", "search_queries": ["..."], "target_sources": "kb", "dependencies": [], "priority": 1}}], "estimated_steps": 3, "suggested_approach": "...", "key_assumptions": ["..."], "success_criteria": ["..."]}}

variables:
  - name: question
    type: string
    required: true
  - name: context
    type: string
    required: false
  - name: kb_info
    type: string
    required: true
  - name: external_info
    type: string
    required: true
  - name: max_subtasks
    type: integer
    required: true

few_shot_examples:
  - input: |
      研究问题：为什么近两季度用户留存下降？
      背景上下文：移动端 DAU 稳定
      可用资源：
      - 知识库: 3 个知识库可用
      - 外部搜索: 未启用
      要求：最多 4 个子任务
    output: '{"original_question": "为什么近两季度用户留存下降？", "complexity": "complex", "research_type": "analytical", "subtasks": [{"id": "task_1", "description": "拆分留存下降的用户分层特征", "search_queries": ["用户留存 分层 渠道 版本"], "target_sources": "kb", "dependencies": [], "priority": 1}], "estimated_steps": 4, "suggested_approach": "先分层定位，再验证关键假设", "key_assumptions": ["埋点口径在对比周期内一致"], "success_criteria": ["定位到可验证的主要下滑因子"]}'
