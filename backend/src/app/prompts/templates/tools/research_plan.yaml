version: "2.0"
name: tools_research_plan
description: "研究计划工具提示词"

template: |
  你是研究规划专家。
  请把研究问题拆解为可执行、可验证的研究计划。

  ## 研究问题
  {question}

  ## 背景上下文
  {context}

  ## 可用资源
  - 知识库：{kb_info}
  - 外部搜索：{external_info}

  ## 约束
  - 最多生成 {max_subtasks} 个子任务
  - 每个子任务应独立可执行且描述清晰
  - 子任务之间的依赖关系要明确且无循环

  输出要求（严格）：
  - 只输出一个 JSON 对象，不要解释，不要代码块，不要额外文字。
  - JSON 顶层字段必须且只能包含：
    - original_question
    - complexity（simple | moderate | complex）
    - research_type（factual | analytical | comparative | exploratory）
    - subtasks
    - estimated_steps
    - suggested_approach
    - key_assumptions
    - success_criteria
  - subtasks 是数组，每项必须包含：
    - id（如 task_1）
    - description
    - search_queries（字符串数组）
    - target_sources（"kb" 或 "web"）
    - dependencies（任务 id 数组）
    - priority（1 到 5，1 为最高）
  - subtasks 数量不得超过 {max_subtasks}。
  - dependencies 只能引用已存在的任务 id。
  - 如果问题简单且单次检索即可回答，complexity 设为 simple，subtasks 仅包含 1 个任务。
  - suggested_approach 应概括整体执行顺序。
  - success_criteria 只写能判断研究是否完成的标准。

  输出示例（仅示例格式）：
  {{"original_question": "...", "complexity": "moderate", "research_type": "analytical", "subtasks": [{{"id": "task_1", "description": "...", "search_queries": ["..."], "target_sources": "kb", "dependencies": [], "priority": 1}}], "estimated_steps": 3, "suggested_approach": "...", "key_assumptions": ["..."], "success_criteria": ["..."]}}

variables:
  - name: question
    type: string
    required: true
  - name: context
    type: string
    required: false
  - name: kb_info
    type: string
    required: true
  - name: external_info
    type: string
    required: true
  - name: max_subtasks
    type: integer
    required: true

few_shot_examples:
  - input: |
      研究问题：公司年假天数是多少？
      背景上下文：无
      可用资源：
      - 知识库：2 个知识库可用
      - 外部搜索：未启用
      要求：最多 3 个子任务
    output: '{"original_question": "公司年假天数是多少？", "complexity": "simple", "research_type": "factual", "subtasks": [{"id": "task_1", "description": "检索公司年假制度相关文档", "search_queries": ["公司 年假 天数 规定"], "target_sources": "kb", "dependencies": [], "priority": 1}], "estimated_steps": 1, "suggested_approach": "直接检索知识库获取年假制度", "key_assumptions": ["知识库中包含人事制度文档"], "success_criteria": ["获取到明确的年假天数规定"]}'
  - input: |
      研究问题：为什么近两季度用户留存下降？
      背景上下文：移动端 DAU 稳定
      可用资源：
      - 知识库：3 个知识库可用
      - 外部搜索：未启用
      要求：最多 4 个子任务
    output: '{"original_question": "为什么近两季度用户留存下降？", "complexity": "complex", "research_type": "analytical", "subtasks": [{"id": "task_1", "description": "拆分留存下降的用户分层特征", "search_queries": ["用户留存 分层 渠道 版本"], "target_sources": "kb", "dependencies": [], "priority": 1}, {"id": "task_2", "description": "验证关键变化是否集中在特定版本或渠道", "search_queries": ["留存 下降 版本 渠道 变化"], "target_sources": "kb", "dependencies": ["task_1"], "priority": 2}], "estimated_steps": 4, "suggested_approach": "先分层定位异常，再验证主要原因。", "key_assumptions": ["对比周期内埋点口径一致"], "success_criteria": ["定位到可验证的主要下滑因子"]}'
