version: "1.0"
name: tools_research_plan
description: "研究计划工具提示词"

template: |
  你是一个研究规划专家。请分析以下研究问题，生成结构化的研究计划。

  ## 研究问题
  {question}

  ## 背景上下文
  {context}

  ## 可用资源
  - 知识库: {kb_info}
  - 外部搜索: {external_info}

  ## 要求
  - 最多生成 {max_subtasks} 个子任务
  - 每个子任务应该是独立可执行的
  - 考虑任务之间的依赖关系

  请以 JSON 格式输出研究计划，包含以下字段：
  - original_question: 原始问题
  - complexity: 复杂度（"simple"/"moderate"/"complex"）
  - research_type: 研究类型（"factual"/"analytical"/"comparative"/"exploratory"）
  - subtasks: 子任务列表，每个子任务包含：
    - id: 任务 ID（如 "task_1"）
    - description: 任务描述
    - search_queries: 建议的搜索查询列表
    - target_sources: 目标来源（"kb"/"web"）
    - dependencies: 依赖的任务 ID 列表
    - priority: 优先级（1-5，1 最高）
  - estimated_steps: 预计步骤数
  - suggested_approach: 建议的研究方法

  只输出 JSON，不要其他内容。

variables:
  - name: question
    type: string
    required: true
  - name: context
    type: string
    required: false
  - name: kb_info
    type: string
    required: true
  - name: external_info
    type: string
    required: true
  - name: max_subtasks
    type: integer
    required: true

few_shot_examples: []
