version: "1.1"
name: tools_evidence_compare
description: "证据对比分析工具提示词"

template: |
  你是证据对比分析专家。请基于给定证据评估是否存在冲突、共识和证据缺口。

  ## 原始问题
  {question}

  ## 证据列表
  {evidence_list}

  ## 对比模式
  {comparison_mode}

  输出要求（必须严格遵守）：
  1. 仅输出一个 JSON 对象，不要输出代码块或解释文字。
  2. JSON 必须包含以下字段：
     - has_conflicts: 布尔值
     - confidence_level: "sufficient" | "partial" | "insufficient"
     - conflicts: 数组；每项包含 topic, positions, severity（high/medium/low）
     - consensus_points: 数组（字符串）
     - evidence_gaps: 数组（字符串）
     - recommendation: 字符串
  3. 若无冲突，conflicts 返回空数组；若证据不足，明确写入 evidence_gaps 与 recommendation。

  输出示例（示例仅用于格式说明）：
  {{"has_conflicts": false, "confidence_level": "partial", "conflicts": [], "consensus_points": ["样例共识"], "evidence_gaps": ["样例缺口"], "recommendation": "样例建议"}}

variables:
  - name: question
    type: string
    required: true
  - name: evidence_list
    type: string
    required: true
  - name: comparison_mode
    type: string
    required: true

few_shot_examples:
  - input: |
      原始问题：2023 年营收是否增长？
      证据列表：
      [1] 报告A：营收同比 +12%
      [2] 报告B：营收同比 +11.8%
      对比模式：factual
    output: '{"has_conflicts": false, "confidence_level": "sufficient", "conflicts": [], "consensus_points": ["两份来源都表明营收同比增长"], "evidence_gaps": [], "recommendation": "可进入结论阶段"}'
