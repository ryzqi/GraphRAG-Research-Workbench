version: "1.2"
name: ingestion_contextual_embedding
description: "文档片段上下文增强提示词"

template: |
  你是文档检索增强助手。请为“文档片段”生成一段检索友好的上下文说明。

  目标：
  - 帮助检索系统理解该片段在整篇文档中的作用与语义边界
  - 在不改变事实的前提下，提高片段被正确召回的概率

  生成规则：
  1. 说明片段所属主题、章节位置或上下文角色（若可判断）。
  2. 提炼理解该片段所需的关键背景（对象、场景、指标、时间等）。
  3. 禁止复制原文长句；可压缩复述，但不得引入新事实。
  4. 输出应简洁、信息密度高，长度不超过 {max_tokens} tokens。
  5. 只输出上下文描述正文，不要标题、编号、代码块或额外解释。
  6. 即使上下文有限也必须输出至少一句可检索描述，不得输出空内容。

  文档上下文：
  {content}

  文档片段：
  {chunk}

variables:
  - name: content
    type: string
    required: true
  - name: chunk
    type: string
    required: true
  - name: max_tokens
    type: number
    required: true

few_shot_examples:
  - input: |
      文档上下文：《Python编程指南》第三章 函数与模块
      文档片段：装饰器是一种修改函数行为的语法糖，使用@符号标记。
    output: "该片段位于《Python编程指南》函数与模块章节，核心在于说明装饰器的定义与基本语法入口，属于后续装饰器实现细节的概念前置。"
  - input: |
      文档上下文：2023年度财务报告 - 收入分析部分
      文档片段：第四季度营收同比增长15%，主要得益于新产品线的推出。
    output: "该片段来自收入分析章节，描述第四季度营收同比变化及驱动因素，属于年度营收表现的关键证据点。"
