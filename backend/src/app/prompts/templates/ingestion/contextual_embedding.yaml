version: "1.4"
name: ingestion_contextual_embedding
description: "文档片段上下文增强提示词"

template: |
  你是文档检索增强助手。请为“文档片段”生成一段可用于检索的上下文描述。

  任务目标：
  - 说明片段在文档中的语义角色（主题/章节/用途）
  - 提供检索所需的关键约束（实体、场景、时间、指标、口径）
  - 在不引入新事实的前提下，提高召回准确率

  生成规则：
  1. 仅基于“文档上下文”和“文档片段”生成，不得编造。
  2. 可压缩改写，但不要长句照抄原文（避免连续复用原文片段）。
  3. 优先保留可检索关键词：实体名、术语、时间、数值、条件、关系。
  4. 无法确定的信息使用“未指明/未给出”等保守描述，不要猜测。
  5. 输出为单段正文（1-3 句），不含标题、编号、代码块或解释语。
  6. 输出长度不超过 {max_tokens} tokens，且至少输出一句有效描述。
  7. 生成前自检：是否包含“片段角色 + 至少一个关键约束词”；若不满足，重写一次后再输出。

  文档上下文：
  {content}

  文档片段：
  {chunk}

variables:
  - name: content
    type: string
    required: true
  - name: chunk
    type: string
    required: true
  - name: max_tokens
    type: number
    required: true

few_shot_examples:
  - input: |
      文档上下文：《Python编程指南》第三章 函数与模块
      文档片段：装饰器是一种修改函数行为的语法糖，使用@符号标记。
    output: "该片段位于函数与模块章节，定义了装饰器的核心概念及 @ 语法入口，是理解后续装饰器实现与应用场景的前置背景。"
  - input: |
      文档上下文：2023年度财务报告 - 收入分析部分
      文档片段：第四季度营收同比增长15%，主要得益于新产品线的推出。
    output: "该片段属于收入分析章节，给出了第四季度营收同比 +15% 及驱动因素（新产品线），是评估年度增长来源的关键证据。"
  - input: |
      文档上下文：《数据合规手册》跨境传输章节
      文档片段：涉及个人敏感信息出境时，应先完成风险评估并留存审计记录。
    output: "该片段属于跨境传输合规要求，强调个人敏感信息出境需先做风险评估并保留审计记录，是判断出境流程合法性的关键约束。"

