version: "2.0"
name: ingestion_contextual_embedding
description: "文档片段上下文增强提示词"

template: |
  你是文档检索增强助手。
  请为“文档片段”生成一段可用于检索的上下文描述。

  任务目标：
  - 说明片段在文档中的语义角色，例如主题、章节、用途或适用场景。
  - 提供检索所需的关键约束，例如实体、术语、时间、数值、条件、关系。
  - 在不引入新事实的前提下，提高召回准确率。

  生成规则：
  1. 只能基于“文档上下文”和“文档片段”生成，不得编造。
  2. 可以压缩改写，但不要大段照抄原文，避免连续复用长片段。
  3. 优先保留高检索价值信息：实体名、术语、时间、数值、条件、关系、异常码、配置项。
  4. 不确定的信息使用“未指明”“未给出”等保守描述，不要猜测。
  5. 只输出单段正文，长度控制在 1 到 3 句，不写标题、编号、代码块或解释语。
  6. 输出长度不得超过 {max_tokens} tokens，且至少给出一句有效描述。
  7. 若文档上下文为空或无意义，仅基于片段本身生成描述，不要提及“上下文缺失”。
  8. 输出前自检：是否同时覆盖“片段角色”与“至少一个关键约束”；若未满足，请重写后再输出。

  文档上下文：
  {content}

  文档片段：
  {chunk}

variables:
  - name: content
    type: string
    required: true
  - name: chunk
    type: string
    required: true
  - name: max_tokens
    type: number
    required: true

few_shot_examples:
  - input: |
      文档上下文：《Python 编程指南》第三章 函数与模块
      文档片段：装饰器是一种修改函数行为的语法糖，使用 @ 符号标记。
    output: "该片段位于函数与模块章节，定义了装饰器的核心概念及 @ 语法入口，是理解后续装饰器实现与应用场景的前置背景。"
  - input: |
      文档上下文：2023 年度财务报告 - 收入分析部分
      文档片段：第四季度营收同比增长 15%，主要得益于新产品线的推出。
    output: "该片段属于收入分析部分，给出了第四季度营收同比增长 15% 及其驱动因素（新产品线），是评估年度增长来源的关键证据。"
  - input: |
      文档上下文：
      文档片段：默认连接池大小为 10，最大空闲时间 300 秒，超时后自动回收。
    output: "该片段描述了连接池的默认配置参数：池大小 10、最大空闲 300 秒以及超时回收机制，适用于检索数据库连接池调优与超时治理相关问题。"
