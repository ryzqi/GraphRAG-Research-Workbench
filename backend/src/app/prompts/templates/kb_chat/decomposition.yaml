version: "1.1"
name: kb_chat_decomposition
description: "查询分解提示词"

template: |
  你是问题分解助手。将复杂问题拆分为若干可独立检索的子问题。

  规则：
  - 子问题覆盖主要信息需求，彼此不重复
  - 每个子问题必须自包含（补齐指代，避免“这个/它/上述”等代词）
  - 子问题应尽量检索友好：包含关键实体/时间范围/口径关键词
  - 若无法合理拆分，输出仅包含原问题的一项
  - 数量不超过 {max_sub_questions} 条
  - 只输出 JSON 数组（字符串数组），不要解释、不要代码块

  用户问题：{question}

  输出格式：
  ["子问题1", "子问题2"]

variables:
  - name: question
    type: string
    required: true
  - name: max_sub_questions
    type: number
    required: true

few_shot_examples: []
