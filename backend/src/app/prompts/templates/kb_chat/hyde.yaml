version: "1.1"
name: kb_chat_hyde
description: "HyDE 假设文档生成提示词"

template: |
  你是检索增强助手。请基于用户问题生成 {num_hypotheses} 段“假设性参考文档”，用于向量检索（HyDE）。

  目标：
  - 产出可嵌入的语义丰富文本，帮助召回潜在相关文档。
  - 每段假设文档都要表达同一问题的不同合理侧重点，避免重复。

  规则：
  1. 只生成用于检索的假设文档，不要直接回答用户问题。
  2. 不得添加与问题无关的信息，不得编造具体数据来源、法规编号或确定性数值。
  3. 保留关键实体、时间范围、场景约束。
  4. 使用自然、信息密度较高的中文表述，每段长度控制在 80-220 字。
  5. 各段应分别覆盖不同角度（定义口径、约束条件、例外情形、实施流程、风险点）。
  6. 输出前自检：是否存在同义重复；若重复，替换为新角度。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true
  - name: num_hypotheses
    type: integer
    required: true

few_shot_examples:
  - input: "铁路旅客运输合同中关于退票手续费的规定"
    output: "{\"hypothetical_documents\":[\"铁路旅客运输合同通常会约定退票手续费与退票时间节点相关。临近开车时间退票手续费比例更高，提前退票比例较低。合同文本还会区分不同车票类型与改签后退票口径。\",\"退票手续费规则通常按开车前剩余时间分档处理，且会区分普通票、特殊票种及改签后退票情形。若因铁路方责任导致退票，常有减免或免收条款。\",\"相关规定常同时覆盖手续费比例、计算基准、办理渠道、时限与例外情形。实践中重点关注‘开车前多久办理’与‘是否属于铁路责任原因’这两类触发条件。\",\"检索时可重点关注退票费率分段阈值（如开车前若干小时/天）、手续费计算口径、是否允许改签后再退票，以及电子客票与纸质票在办理路径上的差异。\",\"在制度文本中，常见结构是先定义适用范围，再给出时间分档费率、特殊情形减免规则、办理渠道限制和争议处理条款。上述要点共同决定最终应收退票手续费。\"]}"
  - input: "Python asyncio 在高并发场景下如何控制任务超时和取消"
    output: "{\"hypothetical_documents\":[\"在 asyncio 高并发处理中，常见做法是为单任务设置超时边界，并在超时后触发取消流程，避免长尾任务持续占用事件循环。相关实现通常关注超时范围、取消传播与资源释放。\",\"异步任务取消需要区分主动取消与超时触发取消，实践中会检查取消异常是否被正确捕获，并确保连接、文件句柄、锁等资源在 finally 阶段释放。\",\"控制超时与取消时，常结合任务分组和并发上限，防止某批任务阻塞整体吞吐。检索应重点关注任务组等待策略、错误聚合方式与失败任务重试边界。\"]}"

