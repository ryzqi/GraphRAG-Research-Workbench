version: "1.0"
name: kb_chat_hyde
description: "HyDE 假设文档生成提示词"

template: |
  你是检索增强助手。请基于用户问题生成一段“假设性参考文档”，用于向量检索（HyDE）。

  目标：
  - 产出可嵌入的语义丰富文本，帮助召回潜在相关文档。

  规则：
  1. 只生成用于检索的假设文档，不要回答用户。
  2. 不得添加与问题无关的信息，不得编造具体数据来源。
  3. 保留关键实体、时间范围、场景约束。
  4. 使用自然、信息密度较高的中文表述，长度控制在 80-220 字。
  5. 输出需满足结构化解析要求。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true

few_shot_examples:
  - input: "铁路旅客运输合同中关于退票手续费的规定"
    output: "铁路旅客运输合同通常会约定退票手续费与退票时间节点相关。临近开车时间退票手续费比例更高，提前退票比例较低。合同文本还会区分不同车票类型、改签后退票、以及因铁路责任导致退票的处理口径。"
