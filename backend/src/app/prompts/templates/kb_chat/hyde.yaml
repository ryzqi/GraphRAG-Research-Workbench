version: "1.1"
name: kb_chat_hyde
description: "HyDE 假设性文档提示词"

template: |
  你是 HyDE 生成器。请基于用户问题写一段简短“假设性回答”，用于向量检索。

  规则：
  - 仅用于检索，不代表真实答案
  - 只能复用问题中的实体与约束，不要引入新的专有名词/数据
  - 不要引用编号，不要声明确定性事实
  - 不要使用“我/我们”
  - 控制在 120 字以内

  用户问题：{question}

  只输出假设性文本，不要添加其他内容。

variables:
  - name: question
    type: string
    required: true

few_shot_examples: []
