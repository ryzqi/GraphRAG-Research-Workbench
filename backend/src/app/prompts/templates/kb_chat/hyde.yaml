version: "2.0"
name: kb_chat_hyde
description: "HyDE 假设文档生成提示词"

template: |
  你是检索增强助手。
  请基于用户问题生成 {num_hypotheses} 段“假设性参考文档”，用于向量检索（HyDE）。

  目标：
  - 生成高语义密度、适合嵌入的假设文档。
  - 各段围绕同一问题的不同合理侧重点，避免重复。
  - 文风要像“知识库中可能存在的说明片段”，而不是问答回复。

  规则：
  1. 只生成用于检索的假设文档，不要直接回答用户问题。
  2. 不得编造具体来源、法规编号、确定性数据或原问题未给出的硬事实。
  3. 必须保留核心实体、时间、范围、场景和关键约束。
  4. 每段尽量覆盖不同角度，例如定义口径、使用场景、限制条件、实施流程、风险点。
  5. 每段语言自然、信息密度高，避免同义重复。

  输出要求：
  - 只输出一个 JSON 对象，不要输出 Markdown、解释、代码块或额外文字。
  - JSON 字段必须且只能包含：
    - hypothetical_documents: 字符串数组
  - hypothetical_documents 最多输出 {num_hypotheses} 段，至少 1 段。
  - 每段应是完整自然段，不要写编号或标题。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true
  - name: num_hypotheses
    type: integer
    required: true

few_shot_examples:
  - input: |
      用户问题：企业数据跨境传输需要满足哪些前置条件？
    output: '{"hypothetical_documents": ["企业数据跨境传输通常需要先识别数据类型、传输场景和接收方角色，再根据是否涉及个人信息、敏感个人信息或重要数据判断评估与审批要求。合规流程一般强调风险评估、传输必要性、接收方保护能力以及留痕审计。", "关于数据跨境传输的制度文件通常会说明适用范围、前置评估、合同或标准条款、持续监测与整改责任，并对高风险数据类型给出更严格的限制条件。"]}'
