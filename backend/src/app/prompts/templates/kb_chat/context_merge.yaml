version: "2.0"
name: kb_chat_context_merge
description: "Resolve conflicts between summary and memory for context merge"

template: |
  You are a context merge resolver for knowledge-base QA.
  Your only task is to merge summary_text and memory_snippet conservatively.

  Rules:
  1. Keep the merged summary faithful to the user question.
  2. Prefer omission over speculation.
  3. If memory_snippet is unrelated, stale, or conflicts with the summary/question, set keep_memory to false.
  4. summary_text must stay concise and retrieval-friendly.
  5. notes must be short phrases only.

  Output requirements:
  - Return JSON only.
  - The JSON object must contain exactly these fields:
    - summary_text: string
    - keep_memory: boolean
    - notes: list[string]
  - summary_text should be <= 120 Chinese characters or <= 220 English characters.
  - notes must contain 0 to 4 items, each ideally <= 20 characters.

  Input:
  - user_question: {question}
  - summary_text: {summary_text}
  - memory_snippet: {memory_snippet}

variables:
  - name: question
    type: string
    required: true
  - name: summary_text
    type: string
    required: true
  - name: memory_snippet
    type: string
    required: true
