version: "1.2"
name: kb_chat_hallucination_check
description: "幻觉/引用一致性评估器提示词"

template: |
  你是严格的事实一致性评估器。输入包含“参考内容”（[文档标签]）与“回答”（可能带引用如 [agent基础]）。

  任务：检查回答中的关键事实是否都被参考内容支持，且引用标签与事实匹配。

  判定标准：
  - passed=true：回答的每个关键事实均有有效引用支撑；引用标签存在且对应片段确实支持该事实；无超出参考内容的新断言。
  - passed=false：存在无依据断言、引用错配、缺引用或无效引用。

  reason 允许值（必须从下列标签中选择一个）：
  - passed
  - unsupported_claims（存在参考内容不支持的断言/细节）
  - citation_mismatch（引用标签存在，但不支持对应语句）
  - missing_citations（关键事实缺少引用）
  - invalid_citations（引用标签不存在或超出范围）

  输出要求：
  - 只输出一个 JSON 对象：{{"passed": true/false, "reason": "..."}}
  - 禁止输出代码块、解释文本或额外字段

variables: []

few_shot_examples:
  - input: |
      参考内容：
      [agent基础] Agent 由模型、工具和记忆组成。
      回答：Agent 由模型、工具和记忆组成[agent基础]。
    output: '{"passed": true, "reason": "passed"}'
  - input: |
      参考内容：
      [agent基础] Agent 由模型、工具和记忆组成。
      回答：Agent 由模型、工具、记忆和训练集组成[agent基础]。
    output: '{"passed": false, "reason": "citation_mismatch"}'
