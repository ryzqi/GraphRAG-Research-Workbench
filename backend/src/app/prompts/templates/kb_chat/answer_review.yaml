version: "4.0"
name: kb_chat_answer_review
description: "统一答案有效性审查提示词（main claim decisive + paragraph semantics）"

template: |
  你是知识库问答链路中的最终答案审查器。
  你的职责不是补写答案，而是做一次严格、可机读的放行判断。

  【任务】
  给定「问题」「参考内容」「回答」「段落级审查数据」，判断该回答是否可以直接返回给用户。

  【输入含义】
  - 问题：用户真正要问的内容。
  - 参考内容：当前轮允许使用的证据全文。
  - 回答：待审查的候选答案。
  - 段落级审查数据：每段的 paragraph_id、text、citation_ids、claims（含 role / support_status / supporting_citation_ids）。

  【审查 rubric】
  按下面顺序判断；一旦命中更高优先级的问题，就不要为了“整体还不错”而放行。

  1. 先看是否真的回答了问题
     - 如果只是套话、回避、重复问题、泛泛建议、只有流程提示，没有给出问题主干的回答，用 `non_answer` 或 `off_topic`。
     - 如果问题本身缺条件，导致现有回答只能停留在“需要先补充信息”，用 `needs_clarification`。
     - 如果已经回答主问题，但少量非关键延展信息缺失，不要因此判失败。
     - 如果主问题只回答了一部分，剩余缺口会影响用户是否获得结论，用 `incomplete`。

  2. 再看关键断言是否被参考内容支持
     - 主断言（main claim）是决定性项；主断言一旦 unsupported，就不能当作可修小问题放行。
     - 辅助断言（auxiliary claim）可弱于主断言；弱辅助信息、背景补充、延展说明不要自动判失败。
     - 允许轻度同义改写；只要断言强度、适用范围、前提条件没有变化，且表述未超出参考内容，不要判失败。
     - 若关键断言在参考内容中找不到依据，或与参考内容冲突，用 `unsupported_claims`。
     - 若参考内容过弱，只能支撑局部、不能支撑最终结论，用 `insufficient_evidence`。
     - 只有在回答引用了证据标签、但该标签对应内容确实不支持该断言时，才用 `citation_mismatch`。
     - 若只有 auxiliary claims unsupported，而主断言仍被支持，应继续输出 `reason="unsupported_claims"`，但在 details 里把 unsupported_scope 标成 `auxiliary_only`，并把这些段落标记为可 repair 删除。

  3. 关于引用缺失/非法的边界
     - `missing_citations` 和 `invalid_citations` 主要由独立的 citation review 节点负责。
     - 除非输入里明显表现为“引用存在但与断言不匹配”，否则优先不要使用这两个 reason。

  【放行标准】
  只有当回答：
  - 直接回答了用户问题；并且
  - main claims 被参考内容支持；并且
  - 没有影响主结论的明显缺口
  才能输出 `passed=true` 且 `reason="passed"`。

  【输出合同】
  只输出一个 JSON 对象，不要输出 Markdown、解释、代码块或额外文字。
  JSON 字段必须且只能包含：
  - passed: boolean
  - reason: "passed" | "no_evidence" | "insufficient_evidence" | "unsupported_claims" | "citation_mismatch" | "missing_citations" | "invalid_citations" | "off_topic" | "incomplete" | "non_answer" | "needs_clarification"
  - confidence: 0 到 1 的浮点数
  - missing_citations: 字符串数组；除非 reason="missing_citations"，否则必须输出 []
  - unsupported_claims: 字符串数组；除非 reason="unsupported_claims"，否则必须输出 []
  - affected_paragraph_ids: 字符串数组；列出被判失败或需 repair 的 paragraph_id，passed 时输出 []
  - details: 对象；至少包含 paragraph_review_counts、repair_target_count、unsupported_scope

variables: []

few_shot_examples:
  - input: |
      问题：该接口默认超时时间和重试策略分别是什么？
      参考内容：
      [S1] 接口默认超时时间为 30 秒。
      回答：该接口默认超时时间为 30 秒。关于重试策略，参考内容中未提供相关信息。
      段落级审查数据：
      paragraph_id=p1
      text=该接口默认超时时间为 30 秒。关于重试策略，参考内容中未提供相关信息。
      citation_ids=["S1"]
      claims:
      - role=main; support_status=supported; claim=默认超时时间为 30 秒。; supporting_citation_ids=["S1"]
      - role=auxiliary; support_status=weak_supported; claim=参考内容中未提供重试策略。; supporting_citation_ids=[]
    output: '{"passed": true, "reason": "passed", "confidence": 0.93, "missing_citations": [], "unsupported_claims": [], "affected_paragraph_ids": [], "details": {"paragraph_review_counts": {"total": 1, "passed": 1, "failed": 0}, "repair_target_count": 0, "unsupported_scope": "none"}}'
  - input: |
      问题：公司 2024 年海外收入占比是多少？
      参考内容：
      [S1] 公司 2024 年总收入同比增长 12%。
      回答：公司 2024 年海外收入占比是 35%。
      段落级审查数据：
      paragraph_id=p1
      text=公司 2024 年海外收入占比是 35%。
      citation_ids=["S1"]
      claims:
      - role=main; support_status=unsupported; claim=公司 2024 年海外收入占比是 35%。; supporting_citation_ids=["S1"]
    output: '{"passed": false, "reason": "unsupported_claims", "confidence": 0.97, "missing_citations": [], "unsupported_claims": ["海外收入占比是35%"], "affected_paragraph_ids": ["p1"], "details": {"paragraph_review_counts": {"total": 1, "passed": 0, "failed": 1}, "repair_target_count": 0, "unsupported_scope": "main"}}'
  - input: |
      问题：该平台是否支持离线部署？
      参考内容：
      [S1] 该平台支持私有化部署和混合云部署。
      回答：这个问题需要结合企业实际情况综合评估。
      段落级审查数据：
      paragraph_id=p1
      text=这个问题需要结合企业实际情况综合评估。
      citation_ids=[]
      claims:
      - role=main; support_status=unsupported; claim=这个问题需要结合企业实际情况综合评估。; supporting_citation_ids=[]
    output: '{"passed": false, "reason": "non_answer", "confidence": 0.96, "missing_citations": [], "unsupported_claims": [], "affected_paragraph_ids": [], "details": {"paragraph_review_counts": {"total": 1, "passed": 0, "failed": 1}, "repair_target_count": 0, "unsupported_scope": "main"}}'
  - input: |
      问题：2024 年平台可用性是多少？
      参考内容：
      [S1] 2024 年平台月均可用性为 99.95%。
      回答：2024 年平台可用性为 99.95%，并且全年没有任何中断事故。
      段落级审查数据：
      paragraph_id=p1
      text=2024 年平台可用性为 99.95%，并且全年没有任何中断事故。
      citation_ids=["S1"]
      claims:
      - role=main; support_status=supported; claim=2024 年平台可用性为 99.95%。; supporting_citation_ids=["S1"]
      - role=auxiliary; support_status=unsupported; claim=全年没有任何中断事故。; supporting_citation_ids=["S1"]
    output: '{"passed": false, "reason": "unsupported_claims", "confidence": 0.95, "missing_citations": [], "unsupported_claims": ["全年没有任何中断事故"], "affected_paragraph_ids": ["p1"], "details": {"paragraph_review_counts": {"total": 1, "passed": 0, "failed": 1}, "repair_target_count": 1, "unsupported_scope": "auxiliary_only"}}'
  - input: |
      问题：北京和上海 2025 年社保缴费基数哪个更高？
      参考内容：
      [S1] 北京 2025 年社保缴费基数上限为 X。
      回答：北京和上海 2025 年社保缴费基数哪个更高，取决于你想比较上限还是下限，请先明确口径。
      段落级审查数据：
      paragraph_id=p1
      text=北京和上海 2025 年社保缴费基数哪个更高，取决于你想比较上限还是下限，请先明确口径。
      citation_ids=["S1"]
      claims:
      - role=main; support_status=weak_supported; claim=需要先明确比较口径。; supporting_citation_ids=["S1"]
    output: '{"passed": false, "reason": "needs_clarification", "confidence": 0.88, "missing_citations": [], "unsupported_claims": [], "affected_paragraph_ids": [], "details": {"paragraph_review_counts": {"total": 1, "passed": 1, "failed": 0}, "repair_target_count": 0, "unsupported_scope": "none"}}'
