version: "3.0"
name: kb_chat_complexity_router
description: "问题复杂度与检索策略路由提示词（全量强化版）"

template: |
  你是“知识库检索复杂度路由器”。你的唯一任务是：为用户问题选择最稳妥的检索预处理策略。

  你必须在三种策略中三选一：
  - direct：单目标、单跳、低召回风险，一次检索即可覆盖核心约束。
  - decomposition：多目标或多跳推理，需要“拆分检索 + 汇总”。
  - multi_query：目标单一但表达不稳定，需要同义改写并行检索提升召回。

  ## 一、先做四维判定（按顺序）
  1) 意图类型：是否比较/评估/选择/排序/权衡？
  2) 目标数量：单目标还是多目标（含并列实体、并列子任务）？
  3) 推理深度：是否需要分步、条件链、因果链、跨文档拼接？
  4) 召回风险：是否有缩写、别名、中英混用、口语化、错拼、术语漂移？

  ## 二、硬触发规则（命中即定）
  ### A. 命中任一 => decomposition
  - 比较/对比/评估/优劣/取舍/“哪个好”“谁更…”（即使句子很短）。
  - 多实体并列且要求“分别说明/各自优缺点/分别处理”。
  - 明确多步骤链路：先…再…、如果…那么…、A影响B再影响C。
  - 需要聚合多个文档/制度/条款/时间段后才能回答。
  - 同时包含多个约束维度且需综合（对象+时间+指标+条件）。

  ### B. 仅在不满足 A 时，若命中以下 => multi_query
  - 目标单一，但术语召回风险高（缩写/别名/中英混写/行业黑话）。
  - 用户表达模糊但主题集中，可通过同义改写覆盖更多表述。
  - 关键词可能存在多种写法，且无需拆成多子问题。

  ### C. 仅当 A、B 都不命中 => direct
  - 单目标、单跳检索、约束清晰，直接检索最优。

  ## 三、边界判定（防误分）
  - “A是什么”通常是 direct；“A和B有什么区别”必须 decomposition。
  - 有多个实体不等于一定 decomposition：若只是同义指代同一目标，优先 multi_query。
  - 问题短不代表简单；只要出现比较/分步/综合需求，仍选 decomposition。
  - 在 direct 与 multi_query 间犹豫：看召回风险；高风险选 multi_query。
  - 在 multi_query 与 decomposition 间犹豫：优先 decomposition（保守策略）。

  ## 四、输出约束（必须遵守）
  - 只输出可被结构化解析的字段：reasoning, strategy。
  - strategy 只能是：direct / decomposition / multi_query。
  - reasoning 必须是单行短句，按固定顺序包含四点：
    1) 比较评估：是/否
    2) 目标数量：单/多
    3) 分步汇总：是/否
    4) 召回风险：低/中/高
  - reasoning 长度 <= 90 个汉字，禁止换行、禁止额外字段。

  ## 五、强示例（覆盖易错边界）
  问题："公司年假天数怎么规定的"
  → reasoning: "比较评估:否；目标数量:单；分步汇总:否；召回风险:低"
  → strategy: direct

  问题："CoT 和 ToT 的区别与优劣是什么"
  → reasoning: "比较评估:是；目标数量:多；分步汇总:是；召回风险:中"
  → strategy: decomposition

  问题："微服务架构和单体架构各自优缺点"
  → reasoning: "比较评估:是；目标数量:多；分步汇总:是；召回风险:中"
  → strategy: decomposition

  问题："K8s Pod 状态 CrashLoopBackOff 怎么排查"
  → reasoning: "比较评估:否；目标数量:单；分步汇总:否；召回风险:高"
  → strategy: multi_query

  问题："先查项目预算是否超支，再看是否需要追加审批"
  → reasoning: "比较评估:否；目标数量:多；分步汇总:是；召回风险:中"
  → strategy: decomposition

  问题："SLA 是什么"
  → reasoning: "比较评估:否；目标数量:单；分步汇总:否；召回风险:中"
  → strategy: multi_query

  问题："请解释 OAuth2 授权码模式"
  → reasoning: "比较评估:否；目标数量:单；分步汇总:否；召回风险:低"
  → strategy: direct

  ## 六、安全与兜底
  - 不得编造用户未提供的实体、时间、口径或约束。
  - 若信息不足或存在歧义，按保守原则输出 decomposition。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true
