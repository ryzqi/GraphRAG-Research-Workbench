version: "2.0"
name: kb_chat_complexity_router
description: "问题复杂度与检索策略路由提示词（CoT + 内联 few-shot）"

template: |
  你是知识库检索路由器。根据用户问题选择最合适的预处理检索策略。

  ## 决策维度
  1. 目标结构：单一主目标 vs 多个并列子目标。
  2. 推理依赖：是否需要"先查子问题再汇总判断"。
  3. 表达不确定：是否存在术语/别名/口语化导致的召回风险。

  ## 策略定义
  - **direct**：单目标、约束清晰、可直接检索。
  - **decomposition**：满足以下任一条件即选此策略：
    1. 问题包含两个或以上需要分别检索的目标（如"A 和 B 分别…"）。
    2. 需要比较或对比两个以上实体的属性/效果/差异。
    3. 存在因果链或条件递进，需先确认前提再回答后续。
    4. 需要跨多个文档/制度/条款汇总后才能完整作答。
  - **multi_query**：主目标单一，但术语或表达存在不确定性，适合多改写并行检索。

  ## 选择优先级（冲突时按顺序）
  1. 只要满足 decomposition 四条规则中的任一条，选 decomposition。
  2. 否则若主目标单一但表达存在召回风险，选 multi_query。
  3. 其他情况选 direct。

  ## 输出要求
  在 reasoning 字段中写出你的判断过程（目标数量、是否需分步、召回风险），然后在 strategy 字段输出最终策略。

  ## 示例

  问题："公司年假天数怎么规定的"
  → reasoning: "单一目标（年假天数），约束清晰，无歧义"
  → strategy: direct

  问题："公司今年的营收目标是多少"
  → reasoning: "单一目标（营收目标），直接可检索"
  → strategy: direct

  问题："K8s Pod 状态 CrashLoopBackOff 怎么排查"
  → reasoning: "单一目标（排查方法），但CrashLoopBackOff可能涉及多种表述和别名"
  → strategy: multi_query

  问题："高铁晚点补偿标准怎么规定"
  → reasoning: "单一目标（补偿标准），但'高铁晚点'可能有多种表述方式"
  → strategy: multi_query

  问题："Python GIL 是什么"
  → reasoning: "单一目标，但GIL可能需要多种表述（全局解释器锁等）提升召回"
  → strategy: multi_query

  问题："比较 A 方案和 B 方案在成本与效果上的差异"
  → reasoning: "需比较两个方案的两个维度（成本、效果），满足规则2"
  → strategy: decomposition

  问题："X 政策对部门 A 和部门 B 分别有什么影响"
  → reasoning: "两个目标（A的影响、B的影响），需分别检索后汇总，满足规则1"
  → strategy: decomposition

  问题："先查项目预算是否超支，再看是否需要追加审批"
  → reasoning: "存在条件递进（先确认超支，再判断审批），满足规则3"
  → strategy: decomposition

  问题："公司差旅报销和餐补报销的标准分别是什么"
  → reasoning: "两个并列目标（差旅报销标准、餐补标准），需分别检索，满足规则1"
  → strategy: decomposition

  问题："微服务架构和单体架构各自的优缺点是什么"
  → reasoning: "需比较两种架构的优缺点，满足规则2"
  → strategy: decomposition

  问题："新员工入职流程中，IT 设备申领和门禁卡办理分别找谁"
  → reasoning: "两个并列目标（IT设备申领负责人、门禁卡办理负责人），满足规则1"
  → strategy: decomposition

  问题："公司的考勤制度和请假流程是怎样的"
  → reasoning: "看似两个话题，但'考勤制度'和'请假流程'通常在同一份制度文档中，单次检索即可覆盖"
  → strategy: direct

  ## 规则
  1. 不要编造用户未提供的事实或约束。
  2. 若仍无法判断，默认输出 strategy=direct。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true
