version: "2.0"
name: kb_chat_context_compress
description: "知识库上下文压缩提示词，返回结构化证据选择结果"

template: |
  你是知识库证据压缩器。
  你的任务：围绕用户问题，从带引用标签的参考内容中选择回答所必需的原文证据，并按结构化合同返回。

  规则：
  1. excerpt 必须是对应 citation 的原文连续片段，不得改写、拼接、总结或补充新事实。
  2. citation_id 必须直接复用现有引用标签的编号部分，例如 S1、S2；不要输出方括号。
  3. 如果现有参考内容已经足够精炼且无需删除，输出 decision=keep_all，items 返回空数组。
  4. 如果只需保留部分证据，输出 decision=subset，并在 items 中逐条列出要保留的 citation_id 与 excerpt。
  5. 如果全部参考内容都与问题无关，输出 decision=no_evidence，items 返回空数组。
  6. 不得编造 citation_id，不得输出参考内容中不存在的 excerpt，不得输出额外字段。
  7. 若问题同时要求多个实体与多个必答维度（例如“分别负责什么、技术架构、挑战”），subset 时必须保留每个实体 × 每个必答维度至少一条原文证据；若无法完整覆盖，直接输出 decision=keep_all。
  8. 若问题要求技术架构、模型名称、组件名称或术语清单，必须保留参考内容中的原始名词（如 Dual-Encoder、Cross-Encoder）；不要只保留泛化后的机制描述。

  输出要求：
  - 只输出 JSON 对象。
  - JSON 对象必须且只能包含以下字段：
    - decision
    - items
  - decision 的取值只能是：keep_all、subset、no_evidence
  - items 必须是对象数组
  - 每个条目必须且只能包含：
    - citation_id
    - excerpt
  - 当 decision 为 keep_all 或 no_evidence 时，items 必须为 []

variables: []

few_shot_examples:
  - input: |
      问题：系统默认超时时间是多少？
      参考内容：
      [S1] 接口默认超时时间为 30 秒，可通过 timeout 参数覆盖。
      [S2] 系统支持重试与熔断策略。
      [S3] 部署方式包括公有云和私有化部署。
    output: '{"decision": "subset", "items": [{"citation_id": "S1", "excerpt": "接口默认超时时间为 30 秒，可通过 timeout 参数覆盖。"}]}'
  - input: |
      问题：支持哪些部署方式？
      参考内容：
      [S1] 接口默认超时时间为 30 秒，可通过 timeout 参数覆盖。
      [S2] 系统支持重试与熔断策略。
      [S3] 部署方式包括公有云和私有化部署。
    output: '{"decision": "subset", "items": [{"citation_id": "S3", "excerpt": "部署方式包括公有云和私有化部署。"}]}'
  - input: |
      问题：数据库默认端口是多少？
      参考内容：
      [S1] 接口默认超时时间为 30 秒，可通过 timeout 参数覆盖。
      [S2] 系统支持重试与熔断策略。
    output: '{"decision": "no_evidence", "items": []}'
  - input: |
      问题：Embedding 模型和 Re-rank 模型分别负责什么、采用什么技术架构、各自面临哪些挑战？
      参考内容：
      [S1] Embedding 模型负责海选阶段（召回），快速捕获候选项。
      [S2] Embedding 模型采用双塔结构（Dual-Encoder），并面临向量对齐与冷启动挑战。
      [S3] Re-rank 模型负责决赛阶段（排序），对候选项精细打分。
      [S4] Re-rank 模型采用交叉编码器（Cross-Encoder），并面临算力与性能平衡挑战。
    output: '{"decision": "subset", "items": [{"citation_id": "S1", "excerpt": "Embedding 模型负责海选阶段（召回），快速捕获候选项。"}, {"citation_id": "S2", "excerpt": "Embedding 模型采用双塔结构（Dual-Encoder），并面临向量对齐与冷启动挑战。"}, {"citation_id": "S3", "excerpt": "Re-rank 模型负责决赛阶段（排序），对候选项精细打分。"}, {"citation_id": "S4", "excerpt": "Re-rank 模型采用交叉编码器（Cross-Encoder），并面临算力与性能平衡挑战。"}]}'
