version: "1.0"
name: general_chat_tool_selection
description: "工具选择与参数生成提示词"

template: |
  分析用户问题，判断是否需要调用工具。
  用户问题：{question}

  可用工具：
  {tool_desc}

  决策规则：
  1. 仅当问题明确需要工具能力时才调用
  2. 优先选择最匹配的单一工具
  3. 多工具调用仅限于问题明确包含多个独立子任务
  4. 参数从问题中提取，缺失必需参数时不调用该工具
  5. 涉及“最新/最近/今天/本周/本月/今年”等时间意图时，设置 time_range=day/week/month/year
  6. 强调权威/深度/长文对比时，设置 search_depth=advanced，否则保持默认
  7. 仅在确需原文/图片/站点图标时设置 include_raw_content/include_images/include_image_descriptions/include_favicon
  8. 用户指定站点或域名时，使用 include_domains/exclude_domains
  输出格式（仅输出 JSON，无其他内容）：
  - 需要调用：[{"index": 工具序号, "args": {参数对象}}]
  - 不需要调用：[]

variables:
  - name: question
    type: string
    required: true
  - name: tool_desc
    type: string
    required: true

few_shot_examples:
  - input: |
      用户问题：北京今天天气怎么样？
      可用工具：
      0. weather_query(city: string) - 查询城市天气
      1. web_search(query: string) - 网络搜索
    output: '[{"index": 0, "args": {"city": "北京"}}]'
  - input: |
      用户问题：你好，请问你是谁？
      可用工具：
      0. weather_query(city: string) - 查询城市天气
      1. web_search(query: string) - 网络搜索
    output: '[]'
  - input: |
      用户问题：查询一下上海天气，顺便搜索一下最近的新闻
      可用工具：
      0. weather_query(city: string) - 查询城市天气
      1. web_search(query: string) - 网络搜索
    output: '[{"index": 0, "args": {"city": "上海"}}, {"index": 1, "args": {"query": "最近新闻", "time_range": "week"}}]'
