version: "1.0"
name: research_report_md
description: "Deep Research final report markdown"

template: |
  # 研究报告

  ## 问题
  {question}

  ## 执行摘要
  {interim_summary}

  {findings_section}{evidence_section}{coverage_gaps_section}{references_section}

variables:
  - name: question
    type: string
    required: true
  - name: interim_summary
    type: string
    required: true
  - name: findings_section
    type: string
    required: false
  - name: evidence_section
    type: string
    required: false
  - name: coverage_gaps_section
    type: string
    required: false
  - name: references_section
    type: string
    required: false
