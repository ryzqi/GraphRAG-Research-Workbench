version: "1.0"
name: research_report_generate_fallback_sections_json
description: "Report generate fallback sections payload"

template: |
  [
    {{"title": "摘要", "content": "{error_message}"}},
    {{"title": "关键发现", "content": "当前无法给出可靠研究发现。"}},
    {{"title": "证据与反证", "content": "证据纪律未满足，请补充可追溯引用并重试。"}},
    {{"title": "结论", "content": "当前输出仅为保底模板，不应视为最终研究结论。"}},
    {{"title": "参考来源", "content": "暂无可追溯来源。"}}
  ]

variables:
  - name: error_message
    type: string
    required: true
