version: "1.0"
name: research_report_generate_fallback_md
description: "Report generate fallback markdown"

template: |
  # 研究报告

  ## 摘要
  {error_message}

  ## 关键发现
  当前无法给出可靠研究发现，请勿将本输出视为最终结论。

  ## 证据与反证
  证据纪律未满足，请补充可追溯引用、冲突说明与来源映射后重试。

  ## 结论
  当前输出仅为保底模板，主要作用是暴露失败原因与待补证项。

  ## 参考来源
  暂无可追溯来源。

variables:
  - name: error_message
    type: string
    required: true
