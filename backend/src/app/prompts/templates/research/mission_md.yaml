version: "1.0"
name: research_mission_md
description: "Deep Research workspace mission markdown"

template: |
  # 研究任务

  - 会话：`{session_slug}`

  ## 研究目标
  {question}

  ## 研究简报
  {research_brief}

  ## 研究边界
  - 聚焦当前问题直接相关的研究边界，不扩展到无关实现细节。
  - 若时间范围、比较维度或成功指标未完全显式给出，采用最保守边界并在报告中标注。

  ## 成功标准
  - 关键结论必须可核查，优先使用官方、原始或同行评审资料。
  - 若存在冲突证据，必须保留限制、争议或 contested 语义。
  - 研究结果应服务于最终可追溯报告，而不是仅输出素材堆砌。

  ## 默认假设
  - 默认保守假设：在不改变研究主线的前提下优先保持范围收敛。
  - 预算指引：{budget_guidance}

  ## 目标来源
  - {target_sources_line}

  ## 交付约束
  - 输出需要能够支撑研究结论、引用清单与覆盖缺口的后续收口。

variables:
  - name: session_slug
    type: string
    required: true
  - name: question
    type: string
    required: true
  - name: research_brief
    type: string
    required: true
  - name: target_sources_line
    type: string
    required: true
  - name: budget_guidance
    type: string
    required: true
