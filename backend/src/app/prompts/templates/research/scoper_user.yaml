version: "1.0"
name: research_scoper_user
description: "Deep Research preflight scoper user prompt"

template: |
  请判断以下 deep research 用户问题是否需要先追问，再输出结构化结果。

  用户问题：{question}

  在形成结构化输出前，请先识别：
  - 已知条件是什么
  - 当前研究对象是什么
  - 是否存在隐含时间范围
  - 是否带有比较/评估维度
  - 是否隐含成功指标或受众/用途
  - 最终需要什么输出形态
  - 哪些未知项会真正改变研究路径，哪些只适合用默认保守假设处理

  输出要求：
  - 只有关键缺口会显著改变研究路径时，才进入 clarify。
  - clarify 时，优先一次性收集所有会改变研究路径的关键缺口；summary 要说明已知焦点与缺失变量；questions 只允许 1 到 2 个问题。
  - clarify 时，允许把多个剩余关键维度聚合为一次提问，只要用户能够一次性作答；不要为时间范围、受众、输出形态等轻微模糊单独追问。
  - proceed 时，research_brief 要写成可直接交给 runtime 执行的研究说明，而不是复述原问题。
  - proceed 时，若只有轻微模糊，直接写入默认保守假设与 budget_guidance，不要为此追问。
  - 若上下文已包含至少一轮用户补充，默认直接生成研究计划；只有在研究对象、核心范围或主比较对象仍缺失到无法规划时，才允许最后一次聚合追问。
  - subtasks 应覆盖事实收集、交叉验证、风险/缺口识别中的核心环节。

variables:
  - name: question
    type: string
    required: true
