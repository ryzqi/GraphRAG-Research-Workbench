version: "2.0"
name: research_scoper_user
description: "Deep Research preflight scoper user prompt（多轮 clarification）"

template: |
  请判断以下 deep research 用户问题是否需要先追问，再输出结构化结果。

  用户问题：{question}

  在形成结构化输出前，请先识别：
  - 已知条件是什么
  - 当前研究对象是什么
  - 是否存在隐含时间范围
  - 是否带有比较/评估维度
  - 是否隐含成功指标或受众/用途
  - 最终需要什么输出形态
  - 哪些未知项会真正改变研究路径，哪些只适合用默认保守假设处理

  输出要求：
  - 只有关键缺口会显著改变研究路径时，才进入 clarify。
  - clarify 时，summary 要说明已知焦点与缺失变量；questions 1–2 个。
  - 允许把多个剩余关键维度聚合为一次提问，只要用户能一次性作答。
  - 时间范围、受众、输出形态等轻微模糊请直接采用默认保守假设，写入 research_brief 或 budget_guidance。
  - 若累积的澄清回答仍无法定位 **研究对象** 或 **主比较维度**，可发起第二轮 1–2 个问题。
  - 当达到 scoper_max_clarify_rounds（默认 2）仍不够时，必须 proceed 并在 research_brief 中显式保留"尚未闭合维度"的保守假设。
  - proceed 时 research_brief 必须可直接交给 runtime 执行；subtasks 覆盖事实收集、交叉验证、风险缺口。

variables:
  - name: question
    type: string
    required: true
