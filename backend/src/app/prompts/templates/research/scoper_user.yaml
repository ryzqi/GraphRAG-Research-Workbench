version: "1.0"
name: research_scoper_user
description: "Deep Research preflight scoper user prompt"

template: |
  请判断以下 deep research 用户问题是否需要先追问，再输出结构化结果。

  用户问题：{question}

  在形成结构化输出前，请先识别：
  - 已知条件是什么
  - 当前研究对象是什么
  - 是否存在隐含时间范围
  - 是否带有比较/评估维度
  - 是否隐含成功指标或受众/用途
  - 最终需要什么输出形态
  - 哪些未知项会真正改变研究路径，哪些只适合用默认保守假设处理

  输出要求：
  - 只有关键缺口会显著改变研究路径时，才进入 clarify。
  - clarify 时，summary 要说明已知焦点与缺失变量；questions 每题只问一个关键问题；每个问题只问一个关键问题。
  - proceed 时，research_brief 要写成可直接交给 runtime 执行的研究说明，而不是复述原问题。
  - proceed 时，若只有轻微模糊，直接写入默认保守假设与 budget_guidance，不要为此追问。
  - subtasks 应覆盖事实收集、交叉验证、风险/缺口识别中的核心环节。

variables:
  - name: question
    type: string
    required: true
