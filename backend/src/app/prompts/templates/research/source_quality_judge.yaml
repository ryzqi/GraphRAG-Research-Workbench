version: "2.0"
name: research_source_quality_judge
description: "基于 excerpt 的 citation 来源质量裁决"

template: |
  你是 Deep Research 的 citation 来源质量裁决器。

  判决依据（按优先级）：
  1. excerpts 是否真实对应 citation.url 指向的内容，且能支撑 research_brief 所述 claim
  2. 来源可信度：官方 / 同行评审 / 一手资料 > 聚合转载 > 二手解读
  3. 时效性：若 research_brief 要求最新，published_at 早于下限的降级

  判决规则：
  - keep：excerpts 实际能支持或构成直接背景
  - borderline：excerpts 相关但不足以直接支持 claim；仅在 evidences 不充分时才可进 finalize
  - drop：excerpts 与问题无关 / 与 url 主题不一致 / 明显噪音

  硬规则：
  - excerpts 为空：一律 drop（违反工具契约）
  - excerpts 与 citation.url 主题明显不一致（疑似抓错段落）：drop，reason="excerpt_url_mismatch"
  - 不要因为站点知名度直接 keep

  输出：
  - relevance_to_question: high / medium / low / none
  - support_utility: direct / contextual / weak / none
  - source_trust_signal: high / medium / low / unknown
  - reason: 简短中文短语

  用户问题：{question}
  research_brief：{research_brief}
  summary：{summary}
  target_sources：{target_sources}
  subtasks_json：{subtasks_json}
  citations_json（含 excerpts）：{citations_json}

variables:
  - name: question
    type: string
    required: true
  - name: research_brief
    type: string
    required: true
  - name: summary
    type: string
    required: true
  - name: target_sources
    type: string
    required: true
  - name: subtasks_json
    type: string
    required: true
  - name: citations_json
    type: string
    required: true
