version: "1.0"
name: research_runtime_user
description: "Deep Research runtime user prompt"

template: |
  <instructions>
  你需要执行当前 deep research runtime，并返回结构化结果。

  <research_process>
  - 先读取 mission、plan、query-map、coverage、claim-map、evidence-ledger、analysis-notes、report-outline、report-draft。
  - 再读取 `task-graph.json`、`claim-bundles.json`、`section-briefs.json`、`live-board.json`，先把主代理的执行计划写入文件，再开始搜索。
  - 进入研究后立刻调用 `write_todos`，待办必须覆盖 claim、coverage gap、子代理委派与最终成稿准备。
  - 主代理先细化 `task-graph.json`：把每个 plan.subtask 拆成 claim / source / section 三类子任务；如果 web 与 paper 取证互不阻塞，应作为同一 `parallel_group` 的并行子任务。
  - 对需要隔离执行的任务，优先使用 `task` 委派给最合适的子代理；委派前后都要更新 `live-board.json`。
  - 严格按 plan.subtasks 的顺序推进；开始某个子任务前调用 `update_plan_progress(step_index=<1-based 子任务序号>, status="current")`，完成后调用 `update_plan_progress(..., status="complete")`；若该子任务失败或被中止，调用同一工具并使用 `failed` 或 `canceled`。
  - 每当当前 agent、当前任务、并行任务集发生变化时，调用 `record_runtime_activity(task_id=..., title=..., task_kind=..., status=..., agent_name=..., subagent_name=..., parallel_group=..., message=...)`。
  - 先补齐 claim-map 与 evidence-ledger，再决定是否需要外部查询。
  - 将 route_hint 与 query_mesh 视为候选检索计划；只选择能关闭当前主张、交叉验证任务或 coverage gap 的最小必要查询集。
  - 外部查询必须服务于某个未闭合主张、交叉验证任务或 coverage gap。
  - 研究过程中持续更新 analysis-notes、report-outline、report-draft、claim-bundles.json、section-briefs.json，必要时补写 report-context.json。
  - workspace 文档只能作为 bootstrap 背景，不能作为满足 web/paper target_sources 的唯一最终证据。
  - 引用优先级：官方/原始/同行评审 > 聚合转载 > 二手解读。
  - 若只有弱证据或单一来源支持，不要把该判断写成确定性 finding。
  - 最后才返回结构化结果；不要把原始搜索结果直接塞回主输出。
  </research_process>

  <output_contract>
  - findings 至少 2 条，必须是可验证的具体结论，且尽量保持一条 finding 只表达一个核心判断。
  - citations 至少 2 条，必须与 findings 对应；结构化输出中也必须保留 citations。
  - 内部组织顺序遵循：结论 -> 证据 -> 冲突/限制 -> 缺口。
  - 若证据冲突，请在 findings 中保留 contested / limitation 语义，不要强行合并。
  - 如果 target_sources 包含 web，必须至少调用一次 `web_search`。
  - 如果 target_sources 包含 paper，必须至少调用一次 `arxiv_search` 或 `arxiv_fetch`。
  - 对 `web_search` 命中的关键网页，优先再调用 `jina_read` 获取正文；需要定向抽取/爬取时再调用 Tavily 抽取或爬取工具。
  - 最终 citations 的 source_provider 必须使用 provider id，不要写成 LangChain官方文档 这类站点名。
  </output_contract>
  </instructions>

  <task_context>
  <question>{question}</question>
  <research_brief>{research_brief}</research_brief>
  <target_sources>{target_sources}</target_sources>
  <route_hint>{route_hint}</route_hint>
  <query_mesh_path>/workspace/context/query_mesh.json</query_mesh_path>
  <priority_workspace_paths>
  {workspace_paths_block}
  </priority_workspace_paths>
  </task_context>

variables:
  - name: question
    type: string
    required: true
  - name: research_brief
    type: string
    required: true
  - name: target_sources
    type: string
    required: true
  - name: route_hint
    type: string
    required: true
  - name: workspace_paths_block
    type: string
    required: false
