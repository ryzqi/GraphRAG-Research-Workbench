version: "2.0"
name: research_runtime_user
description: "Deep Research 主代理 user prompt"

template: |
  你需要按照主 system prompt 的 pipeline 执行当前 deep research，并返回结构化结果。

  <research_process>
  - 先读取 priority_workspace_paths 中给出的实际绝对路径，对应 mission、plan、query-mesh、07-claim-bundles.json、08-section-briefs.json、04-claim-map.json、05-evidence-ledger.json、report-context.json；禁止自行拼接模板路径或改用旧别名。
  - breadth-pass：对每个 plan.subtask 委派 claim-verifier；目标是每条 pending claim 至少拿到 1 条 evidence。
  - breadth gate 通过后，再写 outline 与 section-briefs，让大纲反映真实证据而非凭空推理。
  - depth-pass：按 claim 委派 web-researcher / paper-researcher 把支撑提升到 ≥ 2 独立 provider。
  - draft-pass：section-writer 按 claim-bundle 扩写章节。
  - critic-pass：并行调 evidence-critic + coverage-critic；合并输出并决定是否回流。
  - finalize-pass：citation-steward 审计后，输出 structured_response。
  - 所有工具调用前，调用 `record_runtime_activity(...)` 维持 live-board.json。
  - `plan_progress_snapshot` 由 `[plan-step-<index>]` todos 推导，不要额外维护。
  - workspace 文档只能作为 bootstrap 背景，不能作为 web/paper 类 target 的唯一最终证据。
  </research_process>

  <output_contract>
  - findings ≥ 2，每条表达一个原子事实或趋势；不合并多事实。
  - citations ≥ 2，每条带 ≥ 1 条 excerpts（40–400 字原文）。
  - 结构内部顺序：结论 → 证据 → 冲突/限制 → 缺口。
  - 冲突证据不强行合并；写入 claim.limitations 或 finding 的 contested/limitation 语义。
  - target_sources 含 web → 至少调用一次 `web_search`；含 paper → 至少调用一次 `arxiv_search` 或 `arxiv_fetch`。
  - 对关键网页优先 `jina_read`；需要正文抽取时用 `tavily_extract`。
  - source_provider 使用 provider id，不要写成站点名。
  </output_contract>

  <task_context>
  <question>{question}</question>
  <research_brief>{research_brief}</research_brief>
  <target_sources>{target_sources}</target_sources>
  <route_hint>{route_hint}</route_hint>
  <query_mesh_path>{query_mesh_path}</query_mesh_path>
  <priority_workspace_paths>
  {workspace_paths_block}
  </priority_workspace_paths>
  </task_context>

variables:
  - name: question
    type: string
    required: true
  - name: research_brief
    type: string
    required: true
  - name: target_sources
    type: string
    required: true
  - name: route_hint
    type: string
    required: true
  - name: query_mesh_path
    type: string
    required: true
  - name: workspace_paths_block
    type: string
    required: false
