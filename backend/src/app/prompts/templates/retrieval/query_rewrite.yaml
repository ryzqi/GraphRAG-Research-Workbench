version: "1.3"
name: retrieval_query_rewrite
description: "检索查询重写提示词"

template: |
  将用户问题改写为适合向量检索与关键词检索的简洁查询。

  改写规则：
  1. 保留关键实体、专有名词、时间范围、核心动作与限定条件。
  2. 删除寒暄语、语气词、冗余背景、主观评价和无关修饰。
  3. 可做轻量规范化（术语统一、歧义消解、同义词补充），但不得添加原问题未出现的新事实。
  4. 查询应同时兼顾关键词检索与语义检索，避免过长与过度口语化。
  5. 优先保留对检索分辨率贡献高的词：实体名、时间、指标、错误码、版本号、约束条件。
  6. 查询建议长度为 4-16 个关键词（按语义最小闭包保留）。
  7. 只输出改写后的查询，不要解释、不要代码块。

  用户问题：{question}

variables:
  - name: question
    type: string
    required: true

few_shot_examples:
  - input: "你好，请问一下，咱们公司2023年的销售额大概是多少啊？"
    output: "公司 2023年 销售额"
  - input: "我想了解一下关于Python异步编程的相关内容，特别是asyncio库怎么用"
    output: "Python asyncio 异步编程 使用方法"
  - input: "最近项目上遇到个问题，就是用户登录的时候老是报错，能帮我查查怎么解决吗"
    output: "用户 登录 报错 解决方案"
  - input: "2.4.1 版本支付接口一直报 E503，今天开始出现，怎么回事"
    output: "2.4.1 支付接口 E503 今日开始 报错 原因 排查"

