[alembic]
script_location = alembic
prepend_sys_path = src

# 实际连接串由 app.core.settings 读取 DATABASE_URL 提供；此处仅占位
sqlalchemy.url = postgresql+asyncpg://mkb:mkb_password@localhost:5432/mkb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
