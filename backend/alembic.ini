[alembic]
script_location = alembic
prepend_sys_path = src

# 连接串由 app.core.settings 的 DATABASE_URL 提供；此处仅作占位。
# 注意：若端口变更，这里也要同步更新。
sqlalchemy.url = postgresql+asyncpg://mkb:mkb_password@localhost:5433/mkb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
