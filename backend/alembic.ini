[alembic]
script_location = alembic
prepend_sys_path = src

# Connection string provided by app.core.settings via DATABASE_URL; placeholder only
# Note: if port is changed, update here as well
sqlalchemy.url = postgresql+asyncpg://mkb:mkb_password@localhost:5433/mkb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
