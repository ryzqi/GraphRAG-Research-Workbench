[alembic]
script_location = alembic
prepend_sys_path = src

# DATABASE_URL is provided by app.core.settings at runtime.
# Keep this placeholder non-routable and non-secret-bearing.
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@db.example.invalid:5432/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
